app = "litlabs-terminal-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TERMINAL_SERVER_PORT = "4001"
  TERMINAL_ALLOWED_ORIGIN = "https://litlabs.net"
  TERMINAL_WORKSPACE_ROOT = "/tmp/littree-workspaces"
  TERMINAL_USE_DOCKER = "false"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "20s"
  method = "GET"
  path = "/health"

[[mounts]]
  source = "littree_workspaces"
  destination = "/tmp/littree-workspaces"
