<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" style="background-color:#08080c">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#101018"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="80" y="60" font-family="'Inter', Arial, sans-serif" font-size="32" font-weight="700" fill="#f8fafc" filter="url(#glow)">LiT Console v2 — System Architecture</text>
  <text x="80" y="90" font-family="'JetBrains Mono', monospace" font-size="12" fill="#64748b">One execution loop: Intent → Plan → Execute → Observe → Approve → Ship</text>

  <!-- User Intent -->
  <g transform="translate(80, 140)">
    <rect width="180" height="60" rx="10" fill="#141421" stroke="#00f5ff" stroke-width="1"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">User Intent</text>
    <text x="90" y="48" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">chat / command / file</text>
  </g>

  <!-- Arrow down -->
  <line x1="170" y1="200" x2="170" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Director -->
  <g transform="translate(80, 240)">
    <rect width="180" height="80" rx="10" fill="#141421" stroke="#00f5ff" stroke-width="2" filter="url(#glow)"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" fill="#00f5ff">Director</text>
    <text x="90" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">parse intent → plan</text>
    <text x="90" y="66" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">+ project context</text>
  </g>

  <!-- Arrow right -->
  <line x1="260" y1="280" x2="300" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Run Engine -->
  <g transform="translate(300, 240)">
    <rect width="180" height="80" rx="10" fill="#141421" stroke="#ff7a1a" stroke-width="2" filter="url(#glow)"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" fill="#ff7a1a">Run Engine</text>
    <text x="90" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">persist + schedule</text>
    <text x="90" y="66" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">stream progress</text>
  </g>

  <!-- Arrow right -->
  <line x1="480" y1="280" x2="520" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent Pool -->
  <g transform="translate(520, 200)">
    <rect width="240" height="160" rx="12" fill="#101018" stroke="#252538" stroke-width="1"/>
    <text x="120" y="25" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Agent Pool</text>

    <g transform="translate(15, 45)">
      <rect width="100" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f5ff">Code Champ</text>
    </g>
    <g transform="translate(125, 45)">
      <rect width="100" height="28" rx="6" fill="#1a1a28" stroke="#ff7a1a" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ff7a1a">Social Dom</text>
    </g>
    <g transform="translate(15, 85)">
      <rect width="100" height="28" rx="6" fill="#1a1a28" stroke="#22c55e" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#22c55e">Data Slayer</text>
    </g>
    <g transform="translate(125, 85)">
      <rect width="100" height="28" rx="6" fill="#1a1a28" stroke="#ff6b6b" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ff6b6b">Writer</text>
    </g>
    <g transform="translate(70, 125)">
      <rect width="100" height="28" rx="6" fill="#1a1a28" stroke="#f59e0b" stroke-width="1"/>
      <text x="50" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f59e0b">Director</text>
    </g>
  </g>

  <!-- Arrows down to tools -->
  <line x1="640" y1="360" x2="640" y2="410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tool Registry -->
  <g transform="translate(440, 420)">
    <rect width="400" height="140" rx="12" fill="#101018" stroke="#252538" stroke-width="1"/>
    <text x="200" y="25" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Tool Registry</text>

    <g transform="translate(20, 45)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Terminal</text>
    </g>
    <g transform="translate(110, 45)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Filesystem</text>
    </g>
    <g transform="translate(200, 45)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Git</text>
    </g>
    <g transform="translate(290, 45)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#ff7a1a" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">GitHub</text>
    </g>
    <g transform="translate(20, 90)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#ff7a1a" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Supabase</text>
    </g>
    <g transform="translate(110, 90)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#ff7a1a" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Vercel</text>
    </g>
    <g transform="translate(200, 90)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#ff7a1a" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Browser</text>
    </g>
    <g transform="translate(290, 90)">
      <rect width="80" height="28" rx="6" fill="#1a1a28" stroke="#ff7a1a" stroke-width="1"/>
      <text x="40" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">MCP</text>
    </g>
  </g>

  <!-- Arrows to terminal and preview -->
  <line x1="520" y1="490" x2="220" y2="490" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="840" y1="490" x2="1180" y2="490" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Terminal Server -->
  <g transform="translate(40, 520)">
    <rect width="180" height="100" rx="10" fill="#141421" stroke="#00f5ff" stroke-width="1"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Terminal Server</text>
    <text x="90" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">node-pty + Socket.IO</text>
    <text x="90" y="70" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">sessions + sandbox</text>
  </g>

  <!-- Preview -->
  <g transform="translate(1180, 520)">
    <rect width="180" height="100" rx="10" fill="#141421" stroke="#ff7a1a" stroke-width="1"/>
    <text x="90" y="28" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">App Preview</text>
    <text x="90" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">iframe / Vercel URL</text>
    <text x="90" y="70" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">browser error capture</text>
  </g>

  <!-- Observer + Approval -->
  <g transform="translate(560, 600)">
    <rect width="280" height="80" rx="10" fill="#141421" stroke="#ff7a1a" stroke-width="2" filter="url(#glow)"/>
    <text x="140" y="28" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" fill="#ff7a1a">Observer + Approval</text>
    <text x="140" y="50" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">classify risk → policy → ask/allow/block</text>
    <text x="140" y="66" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">record to audit log</text>
  </g>

  <!-- Arrows up to observer -->
  <line x1="130" y1="620" x2="560" y2="640" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1270" y1="620" x2="840" y2="640" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow up to run engine -->
  <line x1="700" y1="600" x2="700" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory Layer -->
  <g transform="translate(880, 240)">
    <rect width="240" height="160" rx="12" fill="#101018" stroke="#252538" stroke-width="1"/>
    <text x="120" y="25" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Memory & Rules</text>

    <g transform="translate(20, 45)">
      <rect width="200" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="100" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Project Rules</text>
    </g>
    <g transform="translate(20, 85)">
      <rect width="200" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="100" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Memories</text>
    </g>
    <g transform="translate(20, 125)">
      <rect width="200" height="28" rx="6" fill="#1a1a28" stroke="#00f5ff" stroke-width="1"/>
      <text x="100" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Skills / Workflows</text>
    </g>
  </g>

  <!-- Arrow to memory -->
  <line x1="880" y1="280" x2="760" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data Layer -->
  <g transform="translate(200, 730)">
    <rect width="1000" height="120" rx="12" fill="#101018" stroke="#252538" stroke-width="1"/>
    <text x="500" y="25" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Data Layer — Supabase</text>

    <g transform="translate(30, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">projects</text>
    </g>
    <g transform="translate(150, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">runs</text>
    </g>
    <g transform="translate(270, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">run_steps</text>
    </g>
    <g transform="translate(390, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">run_artifacts</text>
    </g>
    <g transform="translate(510, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">terminal_sessions</text>
    </g>
    <g transform="translate(630, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">project_rules</text>
    </g>
    <g transform="translate(750, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">project_memories</text>
    </g>
    <g transform="translate(870, 45)">
      <rect width="110" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="55" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">approval_events</text>
    </g>

    <g transform="translate(300, 85)">
      <rect width="400" height="28" rx="6" fill="#1a1a28" stroke="#64748b" stroke-width="1"/>
      <text x="200" y="18" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f8fafc">Background Worker Queue (Inngest / Trigger.dev / pg_cron)</text>
    </g>
  </g>

  <!-- Arrows to data layer -->
  <line x1="700" y1="680" x2="700" y2="730" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="620" x2="130" y2="730" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1270" y1="620" x2="1270" y2="730" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(1100, 140)">
    <rect width="220" height="120" rx="10" fill="#141421" stroke="#252538" stroke-width="1"/>
    <text x="110" y="25" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="600" fill="#f8fafc">Legend</text>
    <rect x="20" y="45" width="12" height="12" rx="3" fill="#00f5ff" opacity="0.6"/>
    <text x="40" y="55" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">Core / AI layer</text>
    <rect x="20" y="70" width="12" height="12" rx="3" fill="#ff7a1a" opacity="0.6"/>
    <text x="40" y="80" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">Execution / trust</text>
    <rect x="20" y="95" width="12" height="12" rx="3" fill="#64748b" opacity="0.6"/>
    <text x="40" y="105" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8">Data / infra</text>
  </g>
</svg>
