    <text x="20" y="65" font-family="'JetBrains Mono', monospace" font-size="11" fill="#64748b">Async + Reusable</text>

    <text x="20" y="110" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Background Jobs</text>
    <text x="20" y="135" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Durable queue</text>

    <text x="20" y="175" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Reusable Workflows</text>
    <text x="20" y="200" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Save + schedule</text>

    <text x="20" y="240" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Async Review Agents</text>
    <text x="20" y="265" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Refactor, test repair</text>

    <text x="20" y="305" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Agent Handoffs</text>
    <text x="20" y="330" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Subagent pattern</text>
