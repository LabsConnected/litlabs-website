    <text x="20" y="305" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Approval Checkpoints</text>
    <text x="20" y="330" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Risk classification</text>

    <text x="20" y="370" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Project Memory</text>
    <text x="20" y="395" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Rules, memories, skills</text>
