  <!-- Bottom CTA -->
  <text x="800" y="860" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#00f5ff">BUILD THE EXECUTION LOOP FIRST · EVERYTHING ELSE FOLLOWS</text>
