  <text x="390" y="800" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">W5–8</text>
  <text x="630" y="800" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">W9–12</text>
  <text x="870" y="800" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">W13–16</text>
  <text x="1110" y="800" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">W17–20</text>
  <text x="1350" y="800" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">W21–24</text>

