    <text x="20" y="40" font-family="'Inter', Arial, sans-serif" font-size="20" font-weight="700" fill="#ff7a1a">06 · Trust</text>
    <text x="20" y="65" font-family="'JetBrains Mono', monospace" font-size="11" fill="#64748b">Safety + Enterprise</text>

    <text x="20" y="110" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Approval Policies</text>
    <text x="20" y="135" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Granular controls</text>

    <text x="20" y="175" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Sandbox Controls</text>
    <text x="20" y="200" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Docker + egress</text>

    <text x="20" y="240" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Team Features</text>
    <text x="20" y="265" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Shared projects</text>

    <text x="20" y="305" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Enterprise Controls</text>
    <text x="20" y="330" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">SSO, audit, BYOK</text>
