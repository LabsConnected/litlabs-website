    <text x="20" y="135" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Pluggable registry</text>

    <text x="20" y="175" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">GitHub Integration</text>
    <text x="20" y="200" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Issues, PRs, review</text>

    <text x="20" y="240" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Supabase Integration</text>
    <text x="20" y="265" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Schema + queries</text>

    <text x="20" y="305" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Vercel Deploy Loop</text>
    <text x="20" y="330" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Preview + rollback</text>
