  <text x="80" y="105" font-family="'JetBrains Mono', monospace" font-size="14" fill="#64748b">Project-aware AI command center · Intent → Plan → Execute → Observe → Approve → Ship</text>

  <!-- Timeline bar -->
  <rect x="80" y="760" width="1440" height="4" rx="2" fill="#252538"/>
  <circle cx="150" cy="762" r="8" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="390" cy="762" r="8" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="630" cy="762" r="8" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="870" cy="762" r="8" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="1110" cy="762" r="8" fill="#ff7a1a" filter="url(#glow)"/>
  <circle cx="1350" cy="762" r="8" fill="#ff7a1a" filter="url(#glow)"/>

