    <text x="20" y="240" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Terminal + Chat Fusion</text>
    <text x="20" y="265" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Output → context</text>

    <text x="20" y="305" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">Safe Execution</text>
    <text x="20" y="330" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Classify + dry-run</text>

    <text x="20" y="370" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="600" fill="#f8fafc">CWD Tracking</text>
    <text x="20" y="395" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#94a3b8">Per-session context</text>
