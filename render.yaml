services:
  - type: web
    name: litlabs-terminal-server
    runtime: docker
    plan: standard
    dockerfilePath: ./terminal-server/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: TERMINAL_SERVER_PORT
        value: "4001"
      - key: TERMINAL_ALLOWED_ORIGIN
        value: "https://litlabs.net"
      - key: TERMINAL_WORKSPACE_ROOT
        value: "/tmp/littree-workspaces"
      - key: TERMINAL_USE_DOCKER
        value: "false"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
