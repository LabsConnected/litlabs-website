name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  lighthouse:
    name: Run Lighthouse and upload reports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: "https://litlabs.net"
          uploadArtifacts: true
          uploadArtifactsPath: "lighthouse-reports"
          chromeFlags: "--no-sandbox --headless"
          budgetPath: ""
          temporaryPublicStorage: true

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports/**/*
