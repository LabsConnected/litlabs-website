<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="LiTTree Lab Studios logo">
  <defs>
    <linearGradient id="trunk" x1="256" y1="460" x2="256" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="branch" x1="256" y1="260" x2="256" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="leafCircuit" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="256" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- trunk -->
  <path d="M256 460 L256 300 Q256 260 226 240" stroke="url(#trunk)" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M256 380 Q286 360 286 330 T326 300" stroke="url(#trunk)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M256 340 Q216 320 196 280 T146 250" stroke="url(#trunk)" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- circuit branches with nodes -->
  <g stroke="url(#branch)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M226 240 L170 190 L120 210"/>
    <path d="M170 190 L150 140"/>
    <path d="M120 210 L80 200"/>
    <path d="M170 190 L170 120"/>

    <path d="M326 300 L360 240 L410 260"/>
    <path d="M360 240 L340 170"/>
    <path d="M410 260 L460 250"/>
    <path d="M360 240 L390 160"/>

    <path d="M146 250 L110 300 L70 290"/>
    <path d="M110 300 L90 360"/>
    <path d="M146 250 L140 360"/>
  </g>

  <!-- circuit nodes / leaves -->
  <g fill="url(#leafCircuit)">
    <circle cx="226" cy="240" r="9"/>
    <circle cx="170" cy="190" r="7"/>
    <circle cx="120" cy="210" r="6"/>
    <circle cx="150" cy="140" r="6"/>
    <circle cx="80" cy="200" r="5"/>
    <circle cx="170" cy="120" r="5"/>

    <circle cx="326" cy="300" r="9"/>
    <circle cx="360" cy="240" r="7"/>
    <circle cx="410" cy="260" r="6"/>
    <circle cx="340" cy="170" r="6"/>
    <circle cx="460" cy="250" r="5"/>
    <circle cx="390" cy="160" r="5"/>

    <circle cx="146" cy="250" r="8"/>
    <circle cx="110" cy="300" r="6"/>
    <circle cx="70" cy="290" r="5"/>
    <circle cx="90" cy="360" r="5"/>
    <circle cx="140" cy="360" r="5"/>

    <!-- root / base node -->
    <circle cx="256" cy="460" r="12"/>
  </g>

  <!-- subtle neural rings -->
  <g stroke="#a855f7" stroke-width="1.5" opacity="0.4" fill="none">
    <circle cx="170" cy="190" r="22"/>
    <circle cx="360" cy="240" r="22"/>
    <circle cx="110" cy="300" r="18"/>
  </g>
</svg>
